<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonClaw</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --user-msg: #1f6feb;
  --bot-msg: #21262d;
  --success: #3fb950;
  --warning: #d29922;
  --error: #f85149;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
header h1 { font-size: 16px; font-weight: 600; }
header .status {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
header .status .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--warning);
  transition: background 0.3s;
}
header .status .dot.connected { background: var(--success); }
header .status .dot.disconnected { background: var(--error); }
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 8px;
  line-height: 1.5;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: var(--user-msg);
  color: #fff;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--bot-msg);
  border: 1px solid var(--border);
}
.msg.system {
  align-self: center;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  border: none;
  padding: 4px 8px;
}
.msg.thinking {
  align-self: flex-start;
  background: var(--bot-msg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-style: italic;
}
.msg .timestamp {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}
#input-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
#input-bar textarea {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  outline: none;
}
#input-bar textarea:focus { border-color: var(--accent); }
#input-bar button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
#input-bar button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
#input-bar button:not(:disabled):hover { opacity: 0.9; }
</style>
</head>
<body>
<header>
  <h1>MonClaw</h1>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">connecting...</span>
  </div>
</header>
<div id="messages"></div>
<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Type a message..." disabled></textarea>
  <button id="send" disabled>Send</button>
</div>
<script src="/app.js"></script>
</body>
</html>
